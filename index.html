<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Achmad Apanza</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Mengunci scroll di halaman landing */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
        }

        .landing-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-dark);
            text-align: center;
            padding: 20px;
            position: relative;
        }

        /* Logo kecil di pojok kiri atas */
        .landing-logo {
            position: absolute;
            top: 30px;
            left: 50px;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-white);
            letter-spacing: 2px;
        }

        .landing-title {
            font-size: 4.5rem;
            font-weight: 700;
            color: var(--text-white);
            margin-bottom: 10px;
            opacity: 0;
            transform: translateY(-30px);
            animation: slideDown 1s ease 0.2s forwards;
        }

        .landing-subtitle {
            font-size: 1.2rem;
            color: var(--text-gray);
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeIn 1s ease 1s forwards; /* Muncul belakangan */
        }

        .btn-masuk {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--bg-dark);
            background-color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 50px;
            text-decoration: none;
            transition: 0.4s;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            opacity: 0;
            transform: scale(0.9);
            animation: popIn 0.8s ease 1.5s forwards; /* Tombol muncul paling akhir */
        }

        .btn-masuk:hover {
            background-color: transparent;
            color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
            transform: translateY(-5px) scale(1);
        }

        /* Keyframes untuk Animasi */
        @keyframes slideDown {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        /* Responsivitas untuk Layar HP */
        @media (max-width: 768px) {
            .landing-title { font-size: 2.8rem; }
            .landing-subtitle { font-size: 1rem; }
            .landing-logo { left: 20px; top: 20px; font-size: 20px; }
            .btn-masuk { padding: 12px 30px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="landing-wrapper">
        <div class="landing-logo">APANZA<span>.</span></div>
        
        <h1 class="landing-title">Halo, Saya <span>Achmad <span> </span> Apanza</span></h1>
        <p class="landing-subtitle">Cloud Enthusiast | IoT  | Vibe Coder</p>
        
        <a href="beranda.html" class="btn-masuk">Gass Masukkk <i class="fas fa-rocket" style="margin-left: 10px;"></i></a>
    </div>
</body>
</html>
